name: Docker Web

on:
  push:
    branches: [main]
    paths:
      - 'cmd/garmin-web/**'
      - 'internal/web/**'
      - 'internal/hermes/**'
      - 'Dockerfile.web'
      - '.github/workflows/docker-web.yml'

jobs:
  docker-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository }}-web:latest-amd64

  docker-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push arm64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.web
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository }}-web:latest-arm64

  docker-manifest:
    runs-on: ubuntu-latest
    needs: [docker-amd64, docker-arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create multi-arch manifest
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}-web:latest \
            ghcr.io/${{ github.repository }}-web:latest-amd64 \
            ghcr.io/${{ github.repository }}-web:latest-arm64
