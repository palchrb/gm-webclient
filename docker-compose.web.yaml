services:
  garmin-web:
    image: ghcr.io/palchrb/garmin-messenger-web:latest
    # Or build locally:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.web
    container_name: garmin-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - garmin-web-data:/data
    # Volume stores FCM credentials only (Google device IDs for push).
    # Garmin auth tokens are NOT stored on disk.

volumes:
  garmin-web-data:
    # Proxy via Caddy/nginx for HTTPS:
    #   messenger.example.com {
    #       reverse_proxy garmin-web:8080
    #   }
