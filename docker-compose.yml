services:
  garmin-web:
    image: ghcr.io/palchrb/gm-webclient:latest
    # Or build locally:
    # build: .
    container_name: garmin-web
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - garmin-web-data:/data
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Restrict login to specific phone numbers (comma-separated, with country code).
      # Leave empty or unset to allow all phone numbers.
      # Example: PHONE_WHITELIST=+4712345678,+4787654321
      - PHONE_WHITELIST=${PHONE_WHITELIST:-}
      # How many days a login session stays valid (default: 7)
      - SESSION_DAYS=${SESSION_DAYS:-7}
      # Set a secret key to persist sessions across Docker restarts.
      # Sessions are AES-256-GCM encrypted on disk — the file is useless without this key.
      # Leave empty to auto-generate a key (sessions persist but key is lost if volume is deleted).
      - SESSION_KEY=${SESSION_KEY:-}
      # Origin URL for passkey (WebAuthn) support and ntfy click links.
      # Set to your public HTTPS URL to enable passkeys.
      # Example: ORIGIN=https://messenger.example.com
      - ORIGIN=${ORIGIN:-}
      # Push notification behavior: "true" sends push even when browser tabs are open.
      # Set to "false" to only push when no browser tabs are connected.
      - PUSH_ALWAYS=${PUSH_ALWAYS:-true}
      # ntfy.sh push notifications (optional). Set to your ntfy server URL to enable.
      # Notifications are sent alongside Web Push when messages arrive.
      # Example: NTFY_URL=https://ntfy.sh
      - NTFY_URL=${NTFY_URL:-}
      # Include full message body in ntfy notifications (default: false).
      # When false, only "New message" is sent for privacy.
      - NTFY_FULL_MESSAGE=${NTFY_FULL_MESSAGE:-false}
    command: ["/usr/bin/garmin-web", "-addr", ":8080", "-data-dir", "/data"]

volumes:
  garmin-web-data:
    # Proxy via Caddy/nginx for HTTPS:
    #   messenger.example.com {
    #       reverse_proxy garmin-web:8080
    #   }
