<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garmin Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login View -->
    <div id="login-view" class="login-view">
        <div class="login-card">
            <h1>Garmin Messenger</h1>
            <p class="login-subtitle">Log inn med telefonnummer</p>

            <div id="phone-step">
                <input type="tel" id="phone-input" placeholder="+47 xxx xx xxx" autocomplete="tel">
                <button id="request-otp-btn" onclick="requestOTP()">Send kode</button>
            </div>

            <div id="otp-step" class="hidden">
                <p class="otp-info">Kode sendt til <span id="otp-phone"></span></p>
                <input type="text" id="otp-input" placeholder="6-sifret kode" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
                <button id="confirm-otp-btn" onclick="confirmOTP()">Bekreft</button>
            </div>

            <div id="login-error" class="error hidden"></div>
            <div id="login-loading" class="loading hidden">Venter...</div>
        </div>
    </div>

    <!-- Chat View -->
    <div id="chat-view" class="chat-view hidden">
        <header class="header">
            <button id="sidebar-toggle" class="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
            <h1>Garmin Messenger</h1>
            <div class="header-right">
                <span id="user-phone" class="user-phone"></span>
                <button class="logout-btn" onclick="logout()">Logg ut</button>
            </div>
        </header>

        <div class="chat-container">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <h2>Samtaler</h2>
                    <button class="new-chat-btn" onclick="showNewChatDialog()" title="Ny samtale">+</button>
                </div>
                <div id="conversation-list" class="conversation-list">
                    <div class="loading">Laster samtaler...</div>
                </div>
            </aside>

            <!-- New Chat Dialog -->
            <div id="new-chat-dialog" class="modal hidden">
                <div class="modal-content">
                    <h3>Ny samtale</h3>
                    <input type="tel" id="new-chat-phone" placeholder="+47 xxx xx xxx">
                    <input type="text" id="new-chat-message" placeholder="Melding...">
                    <div class="modal-actions">
                        <button class="btn-secondary" onclick="hideNewChatDialog()">Avbryt</button>
                        <button class="btn-primary" onclick="startNewChat()">Send</button>
                    </div>
                    <div id="new-chat-error" class="error hidden"></div>
                </div>
            </div>

            <!-- Message Area -->
            <main id="message-area" class="message-area">
                <div id="no-conversation" class="empty-state">
                    <p>Velg en samtale for a starte</p>
                </div>

                <div id="conversation-view" class="conversation-view hidden">
                    <div class="conversation-header">
                        <button class="back-btn" onclick="deselectConversation()">&#8592;</button>
                        <h3 id="conversation-title">...</h3>
                    </div>
                    <div id="messages" class="messages"></div>
                    <div class="composer">
                        <input type="text" id="message-input" placeholder="Skriv en melding..." onkeydown="handleMessageKeydown(event)">
                        <button id="send-btn" onclick="sendMessage()">&#9654;</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
