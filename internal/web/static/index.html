<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garmin Messenger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login View -->
    <div id="login-view" class="login-view">
        <div class="login-card">
            <h1>Garmin Messenger</h1>
            <p class="login-subtitle">Sign in with your phone number</p>

            <div id="phone-step">
                <input type="tel" id="phone-input" placeholder="+1 234 567 8900" autocomplete="tel">
                <button id="request-otp-btn" onclick="requestOTP()">Send code</button>
            </div>

            <div id="otp-step" class="hidden">
                <p class="otp-info">Code sent to <span id="otp-phone"></span></p>
                <input type="text" id="otp-input" placeholder="6-digit code" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
                <button id="confirm-otp-btn" onclick="confirmOTP()">Confirm</button>
            </div>

            <div id="login-error" class="error hidden"></div>
            <div id="login-loading" class="loading hidden">Please wait...</div>
        </div>
    </div>

    <!-- Chat View -->
    <div id="chat-view" class="chat-view hidden">
        <header class="header">
            <button id="sidebar-toggle" class="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>
            <h1>Garmin Messenger</h1>
            <div class="header-right">
                <span id="user-phone" class="user-phone"></span>
                <button class="logout-btn" onclick="logout()">Log out</button>
            </div>
        </header>

        <div class="chat-container">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar">
                <div class="sidebar-header">
                    <h2>Chats</h2>
                    <button class="new-chat-btn" onclick="showNewChatDialog()" title="New chat">+</button>
                </div>
                <div id="conversation-list" class="conversation-list">
                    <div class="loading">Loading chats...</div>
                </div>
            </aside>

            <!-- New Chat Dialog -->
            <div id="new-chat-dialog" class="modal hidden">
                <div class="modal-content">
                    <h3>New chat</h3>
                    <input type="tel" id="new-chat-phone" placeholder="+1 234 567 8900">
                    <input type="text" id="new-chat-message" placeholder="Message...">
                    <div class="modal-actions">
                        <button class="btn-secondary" onclick="hideNewChatDialog()">Cancel</button>
                        <button class="btn-primary" onclick="startNewChat()">Send</button>
                    </div>
                    <div id="new-chat-error" class="error hidden"></div>
                </div>
            </div>

            <!-- Message Area -->
            <main id="message-area" class="message-area">
                <div id="no-conversation" class="empty-state">
                    <p>Select a conversation to start</p>
                </div>

                <div id="conversation-view" class="conversation-view hidden">
                    <div class="conversation-header">
                        <button class="back-btn" onclick="deselectConversation()">&#8592;</button>
                        <h3 id="conversation-title">...</h3>
                        <button class="leave-btn" onclick="leaveConversation(state.currentConversationId)" title="Leave conversation">&#128465;</button>
                    </div>
                    <div id="messages" class="messages"></div>
                    <div id="media-preview" class="media-preview hidden">
                        <img id="media-preview-img" class="media-preview-img hidden" alt="Preview">
                        <span id="media-preview-audio" class="media-preview-audio hidden"></span>
                        <button class="media-preview-cancel" onclick="cancelMediaPreview()" title="Cancel">&times;</button>
                    </div>
                    <div class="composer">
                        <input type="file" id="file-input" class="hidden" accept="image/jpeg,image/png,image/webp,image/avif,audio/ogg,audio/mpeg,audio/mp4,audio/wav,audio/webm" onchange="handleFileSelect()">
                        <button class="composer-btn" onclick="document.getElementById('file-input').click()" title="Send image or audio file">&#128206;</button>
                        <button id="record-btn" class="composer-btn" onclick="toggleRecording()" title="Record voice message">&#127908;</button>
                        <span id="recording-duration" class="recording-duration hidden"></span>
                        <input type="text" id="message-input" placeholder="Type a message..." onkeydown="handleMessageKeydown(event)">
                        <button id="send-btn" onclick="sendMessage()">&#9654;</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
